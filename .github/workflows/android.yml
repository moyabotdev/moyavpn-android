name: Build MoyaVPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # für das öffentliche Release nötig
    env:
      # true, sobald der Upload-Keystore als Repo-Secret hinterlegt ist
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout MoyaVPN
        uses: actions/checkout@v4

      # AmneziaWG-tunnel-Quellen (nativer Go/NDK-Build) — gepinnt auf v2.0.1
      - name: Checkout AmneziaWG tunnel source
        uses: actions/checkout@v4
        with:
          repository: amnezia-vpn/amneziawg-android
          ref: v2.0.1
          submodules: recursive
          fetch-depth: 0
          path: awg-src

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 16-KB-Page-Size: native Libs auf 16 KB ausrichten (Play-Pflicht ab targetSdk 35).
      # Flag fließt über CMAKE_*_LINKER_FLAGS in libwg/libwg-quick (executables) UND
      # über CGO_LDFLAGS in libwg-go (Go c-shared).
      - name: Patch AmneziaWG build for 16 KB page size
        run: |
          set -e
          CM=awg-src/tunnel/tools/CMakeLists.txt
          sed -i '/project("AmneziaWG")/a string(APPEND CMAKE_EXE_LINKER_FLAGS " -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384")\nstring(APPEND CMAKE_SHARED_LINKER_FLAGS " -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384")' "$CM"
          echo "---- CMakeLists (Kopf) ----"; head -12 "$CM"

      # Baut org.amnezia.awg:tunnel → tunnel-release.aar (libwg-go.so etc.)
      - name: Build AmneziaWG tunnel AAR
        run: |
          cd awg-src
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace :tunnel:assembleRelease

      - name: Stage AAR into app/libs
        run: |
          set -e
          ls -la awg-src/tunnel/build/outputs/aar/
          cp awg-src/tunnel/build/outputs/aar/tunnel-release.aar app/libs/awg-tunnel.aar
          echo "AAR bereit:"; ls -la app/libs/

      # Verifizieren: alle 64-bit .so müssen 16 KB (0x4000) ausgerichtet sein
      - name: Verify 16 KB alignment
        run: |
          set -e
          mkdir -p /tmp/awgcheck && cd /tmp/awgcheck
          unzip -o "$GITHUB_WORKSPACE/app/libs/awg-tunnel.aar" 'jni/arm64-v8a/*.so' 'jni/x86_64/*.so'
          fail=0
          for so in jni/arm64-v8a/*.so jni/x86_64/*.so; do
            al=$(readelf -lW "$so" | awk '/LOAD/{print $NF}' | sort -u | tr '\n' ' ')
            echo "$so → $al"
            echo "$al" | grep -q 0x1000 && { echo "  ✗ 4 KB-Ausrichtung!"; fail=1; }
          done
          [ "$fail" = "0" ] && echo "✓ Alle Libs 16 KB-ausgerichtet" || { echo "16-KB-Check fehlgeschlagen"; exit 1; }

      # Website/Telegram-Verteilung → 'direct'-Variante (mit Kauf-Link)
      - name: Build MoyaVPN debug APK (direct)
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace assembleDirectDebug

      # Play-Variante als installierbare Debug-APK (zeigt die Play-UI ohne Kauf-Buttons,
      # z.B. für Store-Screenshots)
      - name: Build MoyaVPN debug APK (play)
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew --no-daemon --stacktrace assemblePlayDebug

      - name: Stage APKs (stabile Namen)
        run: |
          cp app/build/outputs/apk/direct/debug/app-direct-debug.apk app-debug.apk
          cp app/build/outputs/apk/play/debug/app-play-debug.apk app-play-debug.apk

      - name: Upload APK (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: MoyaVPN-debug-apk
          path: app-debug.apk
          if-no-files-found: error

      # Öffentliches Release mit stabiler Download-URL:
      # https://github.com/moyabotdev/moyavpn-android/releases/download/latest/app-debug.apk
      - name: Publish to GitHub Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: MoyaVPN — neuester Build
          files: |
            app-debug.apk
            app-play-debug.apk
          make_latest: true

      # ── Play Store: signierte AAB (nur wenn Upload-Keystore als Secret hinterlegt) ──
      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/upload.keystore"

      - name: Build Play release AAB (signiert)
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew --no-daemon --stacktrace bundlePlayRelease

      - name: Upload Play AAB
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MoyaVPN-play-aab
          path: app/build/outputs/bundle/playRelease/app-play-release.aab
          if-no-files-found: error
